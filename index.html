<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ETS Attendance 2.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Header -->

    <div class="header-row">

        <h1>ETS Attendance 2.0</h1>

        <button class="gray" onclick="logout()">
            Logout
        </button>

    </div>

    <!-- Toolbar -->

    <div class="top-bar">

        <!-- Left -->

        <div class="left-controls">

            <input
                id="sasid"
                placeholder="SASID">

            <input
                id="firstName"
                placeholder="First Name">

            <input
                id="lastName"
                placeholder="Last Name">

            <select id="school">
                <option value="">Select School</option>
            </select>

            <button onclick="addStudent()">
                Add Student
            </button>

        </div>

        <!-- Right -->

        <div class="right-controls">

            <select
                id="weekSelect"
                onchange="loadAttendance()">
            </select>

            <button onclick="exportWeekCSV()">
                Export Week
            </button>

            <button onclick="exportSummaryCSV()">
                Export Summary
            </button>
        </div>

    </div>

    <!-- Attendance Table -->

    <div class="table-container">

        <table id="attendanceTable">

            <thead>

                <tr>

                    <th>SASID</th>

                    <th>Student Name</th>

                    <th>School</th>

                    <th>Monday</th>

                    <th>Tuesday</th>

                    <th>Wednesday</th>

                    <th>Thursday</th>

                    <th>Friday</th>

                    <th>Total</th>

                </tr>

            </thead>

            <tbody id="attendanceBody">

            </tbody>

        </table>

    </div>

</div>

<!-- Libraries -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-config.js"></script>

<script src="script.js"></script>

</body>

</html>
