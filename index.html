<!DOCTYPE html>
<html>
<head>
  <title>ETS Attendance 2.0</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="header-row">
    <h1>ETS Attendance 2.0</h1>
    <button class="gray" onclick="logout()">Logout</button>
  </div>

  <div class="top-bar">
    <div class="left-controls">
      <input id="sasid" placeholder="SASID">
      <input id="firstName" placeholder="First Name">
      <input id="lastName" placeholder="Last Name">

      <select id="school">
        <option value="">Select School</option>
      </select>

      <button onclick="addStudent()">Add Student</button>

      <select id="weekSelect" onchange="loadAttendance()"></select>
    </div>

    <div class="right-controls">
      <button onclick="exportWeekCSV()">Export Week CSV</button>
      <button onclick="exportSummaryCSV()">Export Summary CSV</button>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>SASID</th>
          <th>Student Name</th>
          <th>School</th>
          <th>Monday</th>
          <th>Tuesday</th>
          <th>Wednesday</th>
          <th>Thursday</th>
          <th>Friday</th>
          <th>Total Present</th>
        </tr>
      </thead>

      <tbody id="attendanceBody"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
